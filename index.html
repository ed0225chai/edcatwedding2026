<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edmund &amp; Catherine — A Fairy Tale Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose:        #f4c2c2;
      --rose-deep:   #c4607a;
      --rose-mid:    #d4748a;
      --gold:        #c9a052;
      --gold-light:  #e8d09a;
      --gold-pale:   #f5ecd4;
      --cream:       #fdf8f2;
      --cream-deep:  #f5ede0;
      --sage:        #8aaa7c;
      --sage-light:  #c4d8b8;
      --lavender:    #c0aed4;
      --petal:       #fce8ec;
      --text-dark:   #2e1f1f;
      --text-mid:    #5c3d3d;
      --text-muted:  #9a7878;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background-color: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* ── Animated fairy dust background ── */
    .fairy-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(.4) rotate(0deg); }
      50%      { opacity: 1; transform: scale(1) rotate(180deg); }
    }

    .petal {
      position: absolute;
      font-size: var(--fs, 13px);
      animation: floatPetal var(--d) linear infinite var(--delay);
      opacity: 0;
    }
    @keyframes floatPetal {
      0%   { transform: translateY(0)   translateX(0)   rotate(0deg);   opacity: 0; }
      10%  { opacity: .8; }
      90%  { opacity: .6; }
      100% { transform: translateY(-110vh) translateX(var(--drift,20px)) rotate(360deg); opacity: 0; }
    }

    /* ── Hero header ── */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 5rem 2rem 2.5rem;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 1rem;
    }
    .eyebrow span {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .eyebrow::before,
    .eyebrow::after {
      content: '';
      flex: 1;
      max-width: 90px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .eyebrow::after { background: linear-gradient(to left, transparent, var(--gold)); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.05;
      letter-spacing: .03em;
      color: var(--text-dark);
      margin-bottom: .6rem;
    }
    h1 em {
      font-style: italic;
      color: var(--rose-deep);
    }

    .tagline {
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-muted);
      letter-spacing: .06em;
      margin-bottom: 1.2rem;
    }

    .ornament {
      font-size: 1.2rem;
      color: var(--gold);
      letter-spacing: .5em;
    }

    /* ── Garland divider ── */
    .garland {
      position: relative;
      z-index: 10;
      text-align: center;
      color: var(--sage);
      font-size: 1rem;
      letter-spacing: .18em;
      margin: 1rem 0;
      user-select: none;
      opacity: .7;
    }

    /* ── Gallery ── */
    .gallery-section {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 2rem 3rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

    .photo-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      border-radius: 2px;
      background: var(--cream-deep);
      box-shadow:
        0 0 0 1px rgba(201, 160, 82, .25),
        0 4px 20px rgba(150, 80, 80, .1);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      animation: cardReveal .7s ease both;
      animation-delay: calc(var(--i) * .07s);
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(28px) scale(.96); }
      to   { opacity: 1; transform: none; }
    }

    .photo-card:hover {
      transform: translateY(-8px) scale(1.025);
      box-shadow:
        0 0 0 1px rgba(201, 160, 82, .5),
        0 20px 50px rgba(140, 70, 70, .2);
      z-index: 5;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s ease;
    }
    .photo-card:hover img { transform: scale(1.04); }

    /* Decorative corners */
    .photo-card::before,
    .photo-card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 3;
      transition: width .3s, height .3s;
      pointer-events: none;
    }
    .photo-card::before { top: 8px; left: 8px;  border-width: 1px 0 0 1px; }
    .photo-card::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
    .photo-card:hover::before,
    .photo-card:hover::after { width: 24px; height: 24px; }

    /* Extra corners via inner element */
    .card-corners::before,
    .card-corners::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 3;
      transition: width .3s, height .3s;
      pointer-events: none;
    }
    .card-corners::before { top: 8px;    right: 8px;  border-width: 1px 1px 0 0; }
    .card-corners::after  { bottom: 8px; left: 8px;   border-width: 0 0 1px 1px; }
    .photo-card:hover .card-corners::before,
    .photo-card:hover .card-corners::after { width: 24px; height: 24px; }

    /* Caption overlay */
    .caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(30, 14, 14, .62));
      padding: 32px 14px 12px;
      color: rgba(255,240,230,.9);
      font-size: .85rem;
      font-style: italic;
      letter-spacing: .06em;
      text-align: center;
      transform: translateY(100%);
      transition: transform .35s ease;
      z-index: 2;
    }
    .photo-card:hover .caption { transform: translateY(0); }

    /* Photo number badge */
    .badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      letter-spacing: .15em;
      color: var(--gold-light);
      background: rgba(20,10,10,.45);
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid rgba(201,160,82,.3);
      z-index: 3;
      backdrop-filter: blur(4px);
    }

    /* Placeholder state */
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fef5f5, #f8f0fb, #f2f0fd);
      gap: 10px;
      position: absolute;
      inset: 0;
    }
    .placeholder-icon { font-size: 2rem; opacity: .5; }
    .placeholder-text {
      font-style: italic;
      font-size: .75rem;
      color: var(--text-muted);
      text-align: center;
      padding: 0 12px;
      line-height: 1.5;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(12, 6, 6, .94);
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }

    .lb-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 90vw;
      animation: lbIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lb-wrap img {
      max-width: 82vw;
      max-height: 78vh;
      object-fit: contain;
      border: 1px solid rgba(201,160,82,.25);
      box-shadow: 0 0 80px rgba(244,194,194,.12);
      display: block;
    }

    .lb-caption {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(245, 225, 200, .7);
      font-size: 1rem;
      letter-spacing: .1em;
      margin-top: 14px;
    }

    .lb-counter {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .25em;
      color: var(--gold);
      margin-top: 6px;
    }

    .lb-close {
      position: absolute;
      top: -18px; right: -18px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--rose-deep);
      color: #fff;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: serif;
      transition: background .2s, transform .2s;
    }
    .lb-close:hover { background: var(--rose-mid); transform: rotate(90deg); }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(201,160,82,.12);
      border: 1px solid rgba(201,160,82,.3);
      color: var(--gold-light);
      font-size: 1.6rem;
      width: 48px; height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .2s;
      user-select: none;
      line-height: 1;
    }
    .lb-nav:hover { background: rgba(201,160,82,.28); }
    .lb-prev { left: -70px; }
    .lb-next { right: -70px; }
    .lb-prev:hover { transform: translateY(-50%) translateX(-3px); }
    .lb-next:hover { transform: translateY(-50%) translateX(3px); }

    @media (max-width: 700px) {
      .lb-prev { left: -44px; }
      .lb-next { right: -44px; }
      .lb-nav { width: 36px; height: 36px; font-size: 1.2rem; }
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem 1rem 4rem;
      border-top: 1px solid rgba(201,160,82,.15);
    }
    .footer-hearts {
      display: block;
      font-size: 1.3rem;
      color: var(--rose-deep);
      margin-bottom: .6rem;
      animation: heartbeat 2.2s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1);    opacity: .7; }
      50%      { transform: scale(1.1); opacity: 1;  }
    }
    footer p {
      font-style: italic;
      color: var(--text-muted);
      font-size: .95rem;
      letter-spacing: .05em;
    }
    footer small {
      display: block;
      margin-top: .5rem;
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      letter-spacing: .3em;
      color: var(--gold);
    }
  </style>
</head>
<body>

<!-- Fairy dust background -->
<div class="fairy-canvas" id="fairyCanvas"></div>

<!-- Hero -->
<header class="hero">
  <div class="eyebrow"><span>Edmund &amp; Catherine</span></div>
  <h1>A <em>Fairy Tale</em><br>Wedding</h1>
  <p class="tagline">Captured in light &amp; love</p>
  <div class="ornament">✦ ✿ ✦</div>
</header>

<div class="garland">🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿</div>

<!-- Gallery -->
<main class="gallery-section">
  <div class="gallery-grid" id="gallery"></div>
</main>

<div class="garland">🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿 ❀ 🌿</div>

<!-- Footer -->
<footer>
  <span class="footer-hearts">♡ ♡ ♡</span>
  <p>Thank you for sharing in our magic</p>
  <small>Edmund &amp; Catherine — Forever &amp; Always</small>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <div class="lb-wrap" id="lbWrap">
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous photo">&#8249;</button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next photo">&#8250;</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
</div>

<script>
  /* =====================================================================
     HOW TO USE THIS GALLERY
     =====================================================================
     1. Put your 12 photos in the same folder as this HTML file.
     2. In the PHOTOS array below, replace each "photo-01.jpg" with
        your actual filename (e.g. "DSC_0042.jpg", "ceremony.jpg", etc.)
     3. Optionally edit the "caption" for each photo.
     4. Open this file in any web browser — done!
     ===================================================================== */

  const PHOTOS = [
    { src: "photo-01.jpg", caption: "The first look" },
    { src: "photo-02.jpg", caption: "Exchanging vows" },
    { src: "photo-03.jpg", caption: "Our first kiss" },
    { src: "photo-04.jpg", caption: "With the family" },
    { src: "photo-05.jpg", caption: "The grand reception" },
    { src: "photo-06.jpg", caption: "Dancing together" },
    { src: "photo-07.jpg", caption: "Bouquet toss" },
    { src: "photo-08.jpg", caption: "Cutting the cake" },
    { src: "photo-09.jpg", caption: "Golden hour glow" },
    { src: "photo-10.jpg", caption: "Confetti joy" },
    { src: "photo-11.jpg", caption: "Sunset farewell" },
    { src: "photo-12.jpg", caption: "Happily ever after" },
  ];

  const ICONS = ["🌸","🕊️","💍","🌺","🦋","🌙","🌹","✨","🍃","🌷","⭐","🌸"];

  /* Build gallery */
  const grid = document.getElementById('gallery');

  PHOTOS.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.setProperty('--i', i);
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `View photo: ${p.caption}`);

    card.innerHTML = `
      <div class="card-corners"></div>
      <img src="${p.src}" alt="${p.caption}" loading="lazy"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="placeholder" style="display:none">
        <div class="placeholder-icon">${ICONS[i]}</div>
        <div class="placeholder-text">${p.src}<br><em>Place your photo here</em></div>
      </div>
      <div class="badge">${String(i + 1).padStart(2,'0')} / 12</div>
      <div class="caption">${p.caption}</div>
    `;

    card.addEventListener('click', () => openLightbox(i));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLightbox(i); });
    grid.appendChild(card);
  });

  /* Lightbox */
  let current = 0;

  function openLightbox(i) {
    current = i;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const p = PHOTOS[current];
    document.getElementById('lbImg').src    = p.src;
    document.getElementById('lbImg').alt    = p.caption;
    document.getElementById('lbCaption').textContent = p.caption;
    document.getElementById('lbCounter').textContent =
      String(current + 1).padStart(2,'0') + ' of ' + String(PHOTOS.length).padStart(2,'0');
  }

  function navigate(dir) {
    current = (current + dir + PHOTOS.length) % PHOTOS.length;
    updateLightbox();
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', () => navigate(-1));
  document.getElementById('lbNext').addEventListener('click', () => navigate(1));
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   navigate(-1);
    if (e.key === 'ArrowRight')  navigate(1);
  });

  /* Fairy dust particles */
  const canvas = document.getElementById('fairyCanvas');
  const sparkleColors = ['#f4c2c2','#d4af6e','#c9b8d8','#a8b89a','#fce8ec','#f0d9a8'];
  const petals        = ['✿','❀','❁','✾','🌸'];

  for (let i = 0; i < 45; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const size = 2 + Math.random() * 5;
    s.style.cssText = [
      `width:${size}px`, `height:${size}px`,
      `left:${Math.random()*100}%`, `top:${Math.random()*100}%`,
      `background:${sparkleColors[i % sparkleColors.length]}`,
      `--d:${2.5 + Math.random()*4}s`,
      `--delay:-${Math.random()*5}s`,
      'opacity:0'
    ].join(';');
    canvas.appendChild(s);
  }

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    const size = 10 + Math.random() * 10;
    const drift = (Math.random() > .5 ? 1 : -1) * (10 + Math.random() * 30);
    p.style.cssText = [
      `left:${Math.random()*100}%`,
      `bottom:${-10 - Math.random()*20}px`,
      `--fs:${size}px`,
      `--d:${7 + Math.random()*8}s`,
      `--delay:-${Math.random()*10}s`,
      `--drift:${drift}px`,
      `color:${sparkleColors[Math.floor(Math.random()*sparkleColors.length)]}`
    ].join(';');
    canvas.appendChild(p);
  }
</script>
</body>
</html>
